name: Publish to npm

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        # Only run when the release tag starts with 'agentscope-v'
        if: startsWith(github.event.release.tag_name, 'agentscope-v')
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install

            - name: Build package
              run: pnpm build:agentscope

            - name: Publish to npm
              run: cd packages/agentscope && pnpm publish --access public --no-git-checks
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
